github_username: kubeboiii
display_name: Himanshu Wankhade
tagline: "DevOps / Platform engineer — AWS, Kubernetes, and cloud-native tooling."
website_url: https://himanshu.wtf/
linkedin_url: https://www.linkedin.com/in/kubeboiii/

exclude_repo_owners:
  - kubeboiii

exclude_repos:
  - kubeboiii/trainer
  - kubeboiii/pipecd

# Pinned first, in this order (only repos you contributed to appear)
flagship_repos:
  - kyverno/kyverno
  - kubeflow/pipelines
  - kubeflow/trainer
  - pipe-cd/pipecd
  - kserve/kserve
  - mindersec/minder
  - kubeflow/spark-operator
  - kubeflow/katib

# Explicit tags; prefix rules fill in the rest
ecosystem_tags:
  kyverno/kyverno: "Policy / Security"
  pipe-cd/pipecd: "GitOps / CD"
  kserve/kserve: "ML Serving"
  mindersec/minder: "Supply Chain"

ecosystem_prefixes:
  kubeflow/: "ML / Kubeflow"
  kubernetes/: "Kubernetes"
  k8s: "Kubernetes"
  argo: "GitOps"
  prometheus/: "Observability"
  grafana/: "Observability"

sort_by: stars
sort_direction: desc

max_merged_prs_per_repo: 0
max_open_prs_per_repo: 0

include_open_prs: true
include_draft_prs: false

open_pr_prefix: "open:"

visible_repo_limit: 15

exclude_title_patterns:
  - "^Merge branch"
  - "^Merge pull request"
